<!doctype html>
<html lang=en>
<head>
    <meta charset=utf-8>
    <meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name=description content="live performance tool">
    <meta name=theme-color content=#CF1A37>
    <meta name=apple-mobile-web-app-capable content=yes>
    <meta name=apple-mobile-web-app-status-bar-style content=black-translucent>
    <meta name=apple-mobile-web-app-title content=Schwungspiel>
    <title>Schwungspiel</title>

    <!-- PWA Manifest -->
    <link rel=manifest href=manifest.json>

    <!-- Icons -->
    <link rel=icon type=image/png sizes=96x96 href=favicon.png>
    <link rel=apple-touch-icon sizes=180x180 href=apple-touch-icon.png>
    <link rel=icon type=image/png sizes=192x192 href=icon-192x192.png>
    <link rel=icon type=image/png sizes=512x512 href=icon-512x512.png>

    <!-- Styles -->
    <link rel=stylesheet href=style.css>
</head>
<body>
    <div class=top-banner>
        <button class=hamburger-button id=hamburgerBtn>☰</button>
        <div class=banner-title>Schwungspiel</div>
    </div>

    <!-- Hamburger Menu -->
    <div class=menu-overlay id=menuOverlay></div>
    <div class=menu-panel id=menuPanel>
        <button class=menu-close id=menuClose>×</button>
        <div class=menu-items>
            <button class=menu-item id=loadSongBtn>📁 Load song</button>
            <button class=menu-item id=sessionViewBtn>Session</button>
            <button class=menu-item id=arrangeViewBtn>Arrange</button>

            <!-- Audio Device Selectors -->
            <div style="padding:15px 0;border-top:1px solid var(--border);margin-top:10px">
                <label style=display:block;color:var(--text-secondary);font-size:.8em;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px>Audio Output</label>
                <select id=outputDeviceList class=menu-item style="padding:10px 15px;margin-bottom:0;width:100%;box-sizing:border-box">
                    <option value="">Default Output</option>
                </select>
            </div>

            <!-- MIDI Device Selectors -->
            <div style="padding:15px 0;border-top:1px solid var(--border);margin-top:10px">
                <label style=display:block;color:var(--text-secondary);font-size:.8em;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px>MIDI Input</label>
                <select id=midiInputList class=menu-item style="padding:10px 15px;margin-bottom:10px;width:100%;box-sizing:border-box">
                    <option value="">None</option>
                </select>
                
                <label style=display:block;color:var(--text-secondary);font-size:.8em;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px>MIDI Output</label>
                <select id=midiOutputList class=menu-item style="padding:10px 15px;margin-bottom:0;width:100%;box-sizing:border-box">
                    <option value="">None</option>
                </select>
            </div>

            <div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px">
                <button class=menu-item id=creditsBtn>About / Credits</button>
            </div>
        </div>
    </div>

    <!-- Credits Modal -->
    <div class=modal-overlay id=creditsOverlay></div>
    <div class=modal id=creditsModal>
        <div class=modal-header>
            <h2>About Schwungspiel</h2>
            <button class=modal-close id=creditsClose>×</button>
        </div>
        <div class=modal-body>
            <p>live performance tool</p>
            <p>
		Uses: libmad, SDL3, ImGui, RtMidi, RegrooveFX, webassembly, ...
            </p>
            <p style=margin-top:20px;font-size:.9em;color:#999>
                Created by Gerard Braad &lt;me@gbraad.nl>
            </p>
        </div>
    </div>

    <!-- Content area with canvas -->
    <div class=content>
        <div id=welcomeMessage style=position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#aaa;font-size:18px;z-index:50>
            <p>Click the ☰ menu button and select <strong>📁 Load Song</strong> to begin</p>
            <p style=font-size:14px;margin-top:20px;color:#777>Supported formats: .mad, .ablbundle, .dawproject</p>
        </div>
        <canvas id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas>
        <input type=file id=fileInput accept=*>
    </div>

    <script async src=schwungspiel.js></script>
</body>
</html>
